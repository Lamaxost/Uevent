services:
  backend:
    image: uevent-backend
    build:
      context: ./services/backend
    ports:
      - "3000:3000"
    volumes:
      - ./services/backend:/app
      - /app/node_modules
    env_file:
      - ./services/backend/.env
    depends_on:
      - db
    restart: always

  frontend:
    image: uevent-frontend
    build:
      context: ./services/frontend
    ports:
      - "5371:3000"
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: always

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "55432:5432"

volumes:
  db_data:
