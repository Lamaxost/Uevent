name: Build and Push to DOCR

on:
  push:
    branches: ["main"]

env:
  REGISTRY_NAME: "uevent-container-registry"
  IMAGE_NAME: "backend-api"
  DOCKERFILE_PATH: "services/backend/Dockerfile.production"

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build Docker image
        run: |
          docker build \
            -t registry.digitalocean.com/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -f ${{ env.DOCKERFILE_PATH }} ./services/backend

      - name: Push image to DigitalOcean Container Registry
        run: |
          docker push registry.digitalocean.com/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: deploy
        run: terraform init \
          -backend-config="endpoint=https://fra1.digitaloceanspaces.com" \
          -backend-config="region=eu-west-1" \
          -backend-config="key=ueventUevent/terraform.tfstate" \
          -backend-config="bucket="terraform-memory"\
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" \
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Terraform Extract droplet IPs
        id: ips
        working-directory: deploy
        run: |
          echo "ips=$(terraform output -json droplet_ips | jq -r 'join(",")')" >> $GITHUB_OUTPUT
          echo "db_host=$(terraform output -raw db_host)" >> $GITHUB_OUTPUT
          echo "db_name=$(terraform output -raw db_name)" >> $GITHUB_OUTPUT
          echo "db_password=$(terraform output -raw db_password)" >> $GITHUB_OUTPUT
          echo "db_port=$(terraform output -raw db_port)" >> $GITHUB_OUTPUT
          echo "db_username=$(terraform output -raw db_username)" >> $GITHUB_OUTPUT

      - name: Deploy to Droplets via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.ips.outputs.ips }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            docker login -u ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} -p ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} registry.digitalocean.com
            docker pull registry.digitalocean.com/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker stop ${{ env.IMAGE_NAME }} || true
            docker rm ${{ env.IMAGE_NAME }} || true

            docker run -d \
              --name ${{ env.IMAGE_NAME }} \
              --restart always \
              --env-file /root/.uevent.env \
              -p 5000:3000 \
              registry.digitalocean.com/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
